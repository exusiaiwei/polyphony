# Polyphony 配置示例 / Polyphony configuration example
#
# 复制到项目根目录并重命名为 polyphony.yaml，然后按需修改。
# Copy to your project root, rename to polyphony.yaml, and edit as needed.
#
# 每个声部（voice）支持两种认证方式，任选其一：
# Each voice supports two auth methods — pick one:
#
#   1. github_token_env  — PAT（适合快速测试 / good for quick testing）
#   2. github_app        — GitHub App（独立 [bot] 身份 / independent [bot] identity）
#
# 两种方式可以在同一份配置中混用。
# You can mix both methods in the same config.

repository: your-org/your-repo

voices:
  # --- GitHub App（推荐 / recommended）---
  - id: claude
    name: Claude
    description: Claude，由 Anthropic 训练 / Claude, by Anthropic.
    github_app:
      app_id: 123456
      installation_id: 78901234
      # 私钥获取方式二选一 / Pick one way to supply the private key:
      #
      # 方式 A: 环境变量直接存 PEM 内容（简单，推荐）
      # Option A: env var holds the PEM content directly (simple, recommended)
      private_key_env: POLYPHONY_CLAUDE_KEY
      #
      # 方式 B: 环境变量存 .pem 文件路径
      # Option B: env var holds the path to a .pem file
      # private_key_path_env: POLYPHONY_CLAUDE_KEY_PATH

  # --- PAT（简单但所有评论显示同一头像）---
  - id: gpt
    name: GPT
    description: GPT，由 OpenAI 训练 / GPT, by OpenAI.
    github_token_env: GPT_BOT_TOKEN
